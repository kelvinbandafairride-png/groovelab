<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Covers - Groove Lab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="/js/api.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--bg:#f0f2f5;--card:#fff;--text:#111;--text2:#555;--border:#ddd;--primary:#1877f2}
body{background:var(--bg);color:var(--text);background-image:radial-gradient(circle at 20% 30%,rgba(24,119,242,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(24,119,242,0.03) 0%,transparent 50%);min-height:100vh}
body::before{content:'♪ ♫ ♩ ♬';position:fixed;font-size:120px;color:rgba(24,119,242,0.03);top:-20px;right:-20px;transform:rotate(25deg);pointer-events:none;z-index:0;letter-spacing:40px}
body::after{content:'♩ ♪ ♫ ♬';position:fixed;font-size:90px;color:rgba(24,119,242,0.025);bottom:40px;left:-10px;transform:rotate(-15deg);pointer-events:none;z-index:0;letter-spacing:30px}
body.dark{--bg:#0d1117;--card:#161b22;--text:#e6edf3;--text2:#8b949e;--border:#30363d;--primary:#58a6ff}
body.dark::before,body.dark::after{color:rgba(88,166,255,0.03)}
.navbar{width:100%;height:75px;background:rgba(255,255,255,0.88);backdrop-filter:blur(18px);position:fixed;top:0;left:0;display:flex;align-items:center;justify-content:space-between;padding:0 25px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
body.dark .navbar{background:rgba(22,27,34,0.92)}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo i{font-size:34px;color:var(--primary)}
.logo h1{color:var(--primary);font-size:32px}
.nav-icons{display:flex;align-items:center;gap:10px}
.icon-box{width:45px;height:45px;background:var(--card);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;border:none;color:var(--text);font-size:18px;text-decoration:none}
.icon-box:hover{background:var(--primary);color:#fff}
.theme-btn{width:45px;height:45px;border-radius:50%;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;color:var(--text);transition:0.3s}
.theme-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.container{max-width:1200px;margin:0 auto;padding:100px 20px 100px;position:relative;z-index:1}
.page-header{margin-bottom:20px}
.page-header h2{font-size:28px}
.page-header h2 i{color:var(--primary);margin-right:10px}
.page-header p{color:var(--text2);margin-top:4px}
.cover-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.cover-card{background:var(--card);border-radius:20px;overflow:hidden;cursor:pointer;transition:0.3s;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.cover-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.1)}
.cover-card .thumb{position:relative;width:100%;padding-top:56.25%;background:#000}
.cover-card .thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.cover-card .thumb .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3)}
.cover-card .thumb .play-overlay i{font-size:48px;color:#fff;text-shadow:0 4px 15px rgba(0,0,0,0.5)}
.cover-card .info{padding:16px}
.cover-card .info h3{font-size:16px;margin-bottom:4px}
.cover-card .info p{font-size:13px;color:var(--text2)}
.player-section{display:none;margin-bottom:25px}
.player-section.show{display:block}
.player-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:24px;overflow:hidden;background:#000;margin-bottom:15px}
.player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.cover-detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px;flex-wrap:wrap;gap:10px}
.cover-detail-header h2{font-size:26px}
.back-btn{padding:10px 20px;border-radius:12px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-weight:600;transition:0.3s;color:var(--text)}
.back-btn:hover{background:var(--bg)}
.cover-nav{display:flex;justify-content:space-between;gap:15px;margin-top:15px}
.cover-nav button{padding:12px 25px;border-radius:12px;font-weight:600;cursor:pointer;transition:0.3s;border:none}
.cover-nav .prev-c{border:2px solid var(--border);background:var(--card);color:var(--text)}
.cover-nav .next-c{background:var(--primary);color:#fff}
.cover-nav button:hover{opacity:0.85}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state i{font-size:64px;margin-bottom:16px;opacity:0.3}
@media(max-width:600px){
.navbar{padding:0 10px;height:62px}
.logo h1{display:none}
.nav-icons{gap:4px}
.icon-box{width:36px;height:36px;border-radius:8px;font-size:14px}
.theme-btn{width:36px;height:36px;font-size:14px;border-radius:8px;border-width:1px}
}
@media(max-width:768px){.cover-grid{grid-template-columns:1fr}}
.music-bar{position:fixed;bottom:0;left:0;width:100%;height:70px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:999;box-shadow:0 -5px 20px rgba(0,0,0,0.08)}
body.dark .music-bar{background:var(--card)}
.music-bar .info{display:flex;align-items:center;gap:12px;min-width:160px}
.music-bar .info img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:var(--bg)}
.music-bar .info .ttl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-bar .info .art{font-size:11px;color:var(--text2)}
.music-bar .ctrls{display:flex;align-items:center;gap:14px}
.music-bar .ctrls button{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:13px;color:var(--text);transition:0.3s;display:flex;align-items:center;justify-content:center}
.music-bar .ctrls button:hover{background:var(--primary);color:#fff}
.music-bar .ctrls .pb{width:42px;height:42px;background:var(--primary);color:#fff;font-size:16px}
.music-bar .extras{display:flex;align-items:center;gap:10px}
.music-bar .extras .lf{width:34px;height:34px;border-radius:50%;border:2px dashed var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.music-bar .extras .lf:hover{border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>

<nav class="navbar">
<a href="mainmenu.html" class="logo"><i class="fa-solid fa-music"></i><h1>Groove Lab</h1></a>
<div class="nav-icons">
<a href="mainmenu.html" class="icon-box"><i class="fa-solid fa-house"></i></a>
<a href="bpm.html" class="icon-box"><i class="fa-solid fa-gauge-high"></i></a>
<a href="loops.html" class="icon-box"><i class="fa-solid fa-drum"></i></a>
<a href="lessons.html" class="icon-box"><i class="fa-solid fa-graduation-cap"></i></a>
<a href="community.html" class="icon-box"><i class="fa-solid fa-comments"></i></a>
<a href="profile.html" class="icon-box"><i class="fa-solid fa-user"></i></a>
<button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
</div>
</nav>

<div class="container">
<div class="page-header">
<h2><i class="fa-solid fa-drum"></i> Drum Covers</h2>
<p>Watch and learn from the best drum cover performances</p>
</div>

<div class="cover-grid" id="coverGrid"></div>

<div class="player-section" id="playerSection">
<div class="player-wrap"><iframe id="videoFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
<div class="cover-detail-header">
<div><h2 id="coverTitle">Cover</h2><p style="color:var(--text2);margin-top:5px" id="coverArtist"></p></div>
</div>
<button class="back-btn" onclick="closePlayer()"><i class="fa-solid fa-arrow-left"></i> Back to Covers</button>
<div class="cover-nav">
<button class="prev-c" onclick="changeCover(-1)"><i class="fa-solid fa-arrow-left"></i> Previous</button>
<button class="next-c" onclick="changeCover(1)">Next <i class="fa-solid fa-arrow-right"></i></button>
</div>
</div>
</div>

<div class="music-bar">
<div class="info">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=100&auto=format&fit=crop" id="mpArt">
<div><div class="ttl" id="mpTitle">No Track</div><div class="art" id="mpArtist">Tap to load music</div></div>
</div>
<div class="ctrls">
<button onclick="mpPrev()"><i class="fa-solid fa-backward-step"></i></button>
<button class="pb" onclick="mpPlay()"><i class="fa-solid fa-play" id="mpPc"></i></button>
<button onclick="mpNext()"><i class="fa-solid fa-forward-step"></i></button>
</div>
<div class="extras">
<button class="lf" onclick="document.getElementById('mpFile').click()" title="Load from device"><i class="fa-solid fa-folder-plus"></i></button>
</div>
</div>
<input type="file" id="mpFile" accept=".mp3,.wav,.flac,.aac,.ogg,.m4a" multiple style="display:none" onchange="mpLoad(this)">
<audio id="mpAudio" style="display:none" onended="mpNext()"></audio>

<script>
// Shared music player
const mpAudio=document.getElementById('mpAudio');
let mpPlaylist=[],mpIdx=-1,mpPlaying=false;
function mpLoad(i){for(let f of i.files){mpPlaylist.push({title:f.name.replace(/\.[^.]+$/,''),artist:'Local File',src:URL.createObjectURL(f)})}i.value='';if(!mpPlaying&&mpPlaylist.length)mpPlayTrack(mpPlaylist.length-1)}
function mpPlayTrack(i){if(i<0||i>=mpPlaylist.length)return;mpIdx=i;const t=mpPlaylist[i];mpAudio.src=t.src;mpAudio.play().then(()=>{mpPlaying=true;document.getElementById('mpPc').className='fa-solid fa-pause';document.getElementById('mpTitle').textContent=t.title;document.getElementById('mpArtist').textContent=t.artist;document.getElementById('mpArt').src=t.art||'https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=100&auto=format&fit=crop'}).catch(()=>{})}
function mpPlay(){if(!mpPlaylist.length){document.getElementById('mpFile').click();return}if(mpIdx<0){mpPlayTrack(0);return}if(mpPlaying){mpAudio.pause();mpPlaying=false;document.getElementById('mpPc').className='fa-solid fa-play'}else{mpAudio.play();mpPlaying=true;document.getElementById('mpPc').className='fa-solid fa-pause'}}
function mpNext(){if(!mpPlaylist.length)return;mpPlayTrack((mpIdx+1)%mpPlaylist.length)}
function mpPrev(){if(!mpPlaylist.length)return;mpPlayTrack((mpIdx-1+mpPlaylist.length)%mpPlaylist.length)}

const covers = [
{title:'7 Rings - Ariana Grande (Drum Cover)',artist:'Drummer Girl',id:'W9V3v9oGKm0'},
{title:'Blinding Lights - The Weeknd Drum Cover',artist:'CooperDrummer',id:'AnF9dHIknqY'},
{title:'Bohemian Rhapsody - Queen Drum Cover',artist:'Mike Johnston',id:'oQnZkORxZBA'},
{title:'Billie Jean - Michael Jackson Drum Cover',artist:'Larnell Lewis',id:'o5An3tD06Vc'},
{title:'Enter Sandman - Metallica Drum Cover',artist:'El Estepario Siberiano',id:'kPAl5WhjQ5w'},
{title:'In The Air Tonight - Phil Collins Drum Cover',artist:'Drumeo',id:'VX_Q7HX5T-M'},
{title:'Stairway to Heaven - Led Zeppelin Drum Cover',artist:'John Bonham Tribute',id:'kzwTW0O6DOE'},
{title:'Back In Black - AC/DC Drum Cover',artist:'Drumeo',id:'aPtVnO3J6tQ'},
{title:'Beat It - Michael Jackson Drum Cover',artist:'Luke Holland',id:'TYb2xWq74X8'},
{title:'Smells Like Teen Spirit - Nirvana Drum Cover',artist:'Dave Grohl Tribute',id:'M_kwZy0Jc-I'},
{title:'Take Five - Dave Brubeck Drum Cover',artist:'Dave Weckl',id:'vmDDOFXSgAs'},
{title:'Humble - Kendrick Lamar Drum Cover',artist:'Drum Club TV',id:'A2rYnPxbX_Y'}
];

let currentIdx = 0;

function toggleTheme(){
document.body.classList.toggle('dark');
const i=document.querySelector('.theme-btn i');
i.className=document.body.classList.contains('dark')?'fa-solid fa-sun':'fa-solid fa-moon';
localStorage.setItem('grooveTheme',document.body.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('grooveTheme')==='dark'){document.body.classList.add('dark');document.querySelector('.theme-btn i').className='fa-solid fa-sun'}

function renderCovers(){
const grid=document.getElementById('coverGrid');
grid.innerHTML=covers.map((c,i)=>`
<div class="cover-card" onclick="openCover(${i})">
<div class="thumb"><img src="https://img.youtube.com/vi/${c.id}/mqdefault.jpg" onerror="this.style.display='none'"><div class="play-overlay"><i class="fa-solid fa-play-circle"></i></div></div>
<div class="info"><h3>${c.title}</h3><p>${c.artist}</p></div>
</div>
`).join('');
}

function openCover(i){
currentIdx=i;
const c=covers[i];
document.getElementById('coverGrid').style.display='none';
document.getElementById('playerSection').classList.add('show');
document.getElementById('videoFrame').src='https://www.youtube.com/embed/'+c.id+'?autoplay=1&rel=0';
document.getElementById('coverTitle').textContent=c.title;
document.getElementById('coverArtist').textContent=c.artist;
}

function closePlayer(){
document.getElementById('playerSection').classList.remove('show');
document.getElementById('coverGrid').style.display='grid';
document.getElementById('videoFrame').src='';
}

function changeCover(dir){
const next=currentIdx+dir;
if(next<0||next>=covers.length)return;
openCover(next);
}

renderCovers();
</script>
</body>
</html>
