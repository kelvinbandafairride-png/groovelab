<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Lessons - Groove Lab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="/js/api.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--bg:#f0f2f5;--card:#fff;--text:#111;--text2:#555;--border:#ddd;--primary:#1877f2}
body{background:var(--bg);color:var(--text);background-image:radial-gradient(circle at 10% 20%,rgba(24,119,242,0.04) 0%,transparent 50%),radial-gradient(circle at 90% 80%,rgba(24,119,242,0.03) 0%,transparent 50%);min-height:100vh}
body::before{content:'♪ ♫ ♩ ♬';position:fixed;font-size:120px;color:rgba(24,119,242,0.03);top:-20px;right:-20px;transform:rotate(25deg);pointer-events:none;z-index:0;letter-spacing:40px}
body::after{content:'♩ ♪ ♫ ♬';position:fixed;font-size:90px;color:rgba(24,119,242,0.025);bottom:40px;left:-10px;transform:rotate(-15deg);pointer-events:none;z-index:0;letter-spacing:30px}
body.dark{--bg:#0d1117;--card:#161b22;--text:#e6edf3;--text2:#8b949e;--border:#30363d;--primary:#58a6ff}
.navbar{width:100%;height:75px;background:rgba(255,255,255,0.88);backdrop-filter:blur(18px);position:fixed;top:0;display:flex;align-items:center;justify-content:space-between;padding:0 25px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
body.dark .navbar{background:rgba(22,27,34,0.92)}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo i{font-size:34px;color:var(--primary)}
.logo h1{font-size:32px;color:var(--primary)}
.nav-icons{display:flex;align-items:center;gap:10px}
.icon-box{width:45px;height:45px;background:var(--card);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;border:none;color:var(--text);font-size:18px;text-decoration:none}
.icon-box:hover{background:var(--primary);color:#fff}
.theme-btn{width:45px;height:45px;border-radius:50%;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;color:var(--text);transition:0.3s}
.theme-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.container{max-width:1200px;margin:0 auto;padding:100px 20px 30px}
.page-header{margin-bottom:20px}
.page-header h2{font-size:28px}
.page-header h2 i{color:var(--primary);margin-right:10px}
.browse-bar{display:flex;gap:12px;overflow-x:auto;padding:10px 0 20px;flex-wrap:wrap}
.cat-pill{display:flex;align-items:center;gap:8px;padding:10px 22px;border-radius:30px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:0.3s;font-size:15px;font-weight:600;color:var(--text2);white-space:nowrap;flex-shrink:0}
.cat-pill:hover,.cat-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.cat-pill i{font-size:16px}
.cat-pill .count{background:rgba(0,0,0,0.1);padding:2px 10px;border-radius:12px;font-size:12px;margin-left:4px}
.cat-pill.active .count{background:rgba(255,255,255,0.2);color:#fff}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:25px}
.lesson-card{background:var(--card);border-radius:20px;overflow:hidden;cursor:pointer;transition:0.3s;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.lesson-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.1)}
.lesson-card .thumb{position:relative;width:100%;padding-top:56%;background:#000}
.lesson-card .thumb iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;pointer-events:none}
.lesson-card .thumb .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3)}
.lesson-card .thumb .play-overlay i{font-size:48px;color:#fff;text-shadow:0 4px 15px rgba(0,0,0,0.5)}
.lesson-card .info{padding:16px}
.lesson-card .info .cat-tag{display:inline-block;padding:4px 12px;border-radius:10px;background:rgba(24,119,242,0.1);color:var(--primary);font-size:12px;font-weight:600;margin-bottom:8px}
.lesson-card .info h3{font-size:16px;margin-bottom:6px}
.lesson-card .info p{font-size:13px;color:var(--text2);line-height:1.4}
.lesson-card .info .done-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 12px;border-radius:10px;background:rgba(66,183,42,0.15);color:#42b72a;font-size:12px;font-weight:600}
.player-section{display:none;margin-bottom:25px}
.player-section.show{display:block}
.player-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:24px;overflow:hidden;background:#000;margin-bottom:15px}
.player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.lesson-detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px;flex-wrap:wrap;gap:10px}
.lesson-detail-header h2{font-size:26px}
.back-btn{padding:10px 20px;border-radius:12px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-weight:600;transition:0.3s;color:var(--text)}
.back-btn:hover{background:var(--bg)}
.progress-card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.progress-card h3{margin-bottom:12px;font-size:18px}
.progress-card h3 i{color:var(--primary);margin-right:8px}
.progress-row{display:flex;align-items:center;gap:15px;margin-bottom:10px}
.progress-row .pbar{flex:1;height:10px;background:var(--bg);border-radius:20px;overflow:hidden}
.progress-row .pbar .fill{height:100%;background:var(--primary);border-radius:20px;transition:width 0.5s}
.progress-row .pct{font-size:14px;font-weight:600;color:var(--primary);min-width:40px}
.quiz-card{background:var(--card);border-radius:20px;padding:25px;margin:20px 0;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.quiz-card h3{margin-bottom:15px;font-size:20px}
.quiz-card h3 i{color:var(--primary);margin-right:8px}
.quiz-q{margin-bottom:20px;padding:18px;border-radius:16px;background:var(--bg)}
.quiz-q .q-title{font-weight:600;margin-bottom:12px;font-size:16px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;margin-bottom:8px;border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:0.3s;background:var(--card)}
.quiz-opt:hover{border-color:var(--primary)}
.quiz-opt input[type="radio"]{accent-color:var(--primary)}
.quiz-opt.correct{border-color:#42b72a;background:rgba(66,183,42,0.08)}
.quiz-opt.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.08)}
.quiz-result{padding:15px;border-radius:12px;margin-top:15px;font-weight:600;display:none}
.quiz-result.pass{display:block;background:rgba(66,183,42,0.12);color:#42b72a}
.quiz-result.fail{display:block;background:rgba(231,76,60,0.12);color:#e74c3c}
.submit-quiz{padding:12px 30px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:0.3s}
.submit-quiz:hover{opacity:0.9}
.lesson-nav{display:flex;justify-content:space-between;gap:15px;margin-top:20px}
.lesson-nav button{padding:14px 30px;border-radius:14px;font-weight:600;cursor:pointer;transition:0.3s;border:none;flex:1}
.lesson-nav .prev-btn{background:var(--bg);color:var(--text)}
.lesson-nav .next-btn{background:var(--primary);color:#fff}
.lesson-nav button:hover{opacity:0.85}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state i{font-size:64px;margin-bottom:16px;opacity:0.3}
@media(max-width:600px){
.navbar{padding:0 10px;height:62px}
.logo h1{display:none}
.nav-icons{gap:4px}
.icon-box{width:36px;height:36px;border-radius:8px;font-size:14px}
.theme-btn{width:36px;height:36px;font-size:14px;border-radius:8px;border-width:1px}
}
@media(max-width:768px){.lesson-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="navbar">
<a href="index.html" class="logo"><i class="fa-solid fa-music"></i><h1>Groove Lab</h1></a>
<div class="nav-icons">
<a href="mainmenu.html" class="icon-box"><i class="fa-solid fa-house"></i></a>
<a href="bpm.html" class="icon-box"><i class="fa-solid fa-gauge-high"></i></a>
<a href="loops.html" class="icon-box"><i class="fa-solid fa-drum"></i></a>
<a href="community.html" class="icon-box"><i class="fa-solid fa-comments"></i></a>
<a href="upload.html" class="icon-box"><i class="fa-solid fa-upload"></i></a>
<a href="profile.html" class="icon-box"><i class="fa-solid fa-user"></i></a>
<a href="about.html" class="icon-box"><i class="fa-solid fa-circle-info"></i></a>
<button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
</div>
</nav>

<div class="container">
<div class="page-header">
<h2><i class="fa-solid fa-graduation-cap"></i> Lessons</h2>
<p style="color:var(--text2);margin-top:4px" id="progressText">Pick a category to start learning</p>
</div>

<div class="browse-bar" id="categoryBar"></div>
<div class="lesson-grid" id="lessonGrid"></div>

<div class="player-section" id="playerSection">
<div class="player-wrap" id="playerWrap">
<div id="ytThumb" style="position:absolute;inset:0;cursor:pointer;background:#000;display:flex;align-items:center;justify-content:center">
<img id="ytThumbImg" style="width:100%;height:100%;object-fit:cover" src="">
<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3)">
<i class="fa-solid fa-play-circle" style="font-size:72px;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.6)"></i>
</div>
</div>
<iframe id="videoFrame" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="display:none"></iframe>
</div>
<div class="lesson-detail-header">
<div><h2 id="lessonTitle">Lesson</h2><p style="color:var(--text2);margin-top:5px" id="lessonDesc"></p></div>
<div id="completionBadge"></div>
</div>
<button class="back-btn" onclick="closePlayer()"><i class="fa-solid fa-arrow-left"></i> Back to Lessons</button>
<a id="ytLinkBtn" href="#" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;background:#c00;color:#fff;font-weight:600;text-decoration:none;font-size:14px;margin-left:10px"><i class="fa-brands fa-youtube"></i> Watch on YouTube</a>
<div class="progress-card"><h3><i class="fa-solid fa-chart-simple"></i> Course Progress</h3>
<div class="progress-row"><span style="font-weight:600">Overall</span><div class="pbar"><div class="fill" id="overallProgress" style="width:0%"></div></div><span class="pct" id="progressPct">0%</span></div></div>
<div id="quizArea"></div>
<div class="lesson-nav">
<button class="prev-btn" onclick="changeLesson(-1)"><i class="fa-solid fa-arrow-left"></i> Previous</button>
<button class="next-btn" onclick="changeLesson(1)">Next <i class="fa-solid fa-arrow-right"></i></button>
</div>
</div>
</div>

<script>
function toggleTheme(){
document.body.classList.toggle('dark');
const i=document.querySelector('.theme-btn i');
i.className=document.body.classList.contains('dark')?'fa-solid fa-sun':'fa-solid fa-moon';
localStorage.setItem('grooveTheme',document.body.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('grooveTheme')==='dark'){document.body.classList.add('dark');document.querySelector('.theme-btn i').className='fa-solid fa-sun'}

const quizData={
'Drum':[
{q:'What is the most important skill for beginners?',options:['Speed','Stick control','Volume','Drum solos'],answer:1},
{q:'What tool helps musicians maintain consistent tempo?',options:['Amplifier','Metronome','Equalizer','Reverb'],answer:1},
{q:'What is a fill in drumming?',options:['A pause','A transition pattern','The main beat','A cymbal crash'],answer:1},
{q:'Which genre heavily uses syncopated grooves?',options:['Classical','Jazz','Country','Opera'],answer:1},
{q:'What does a drummer use to keep time?',options:['Guitar pick','Metronome','Amplifier','Capo'],answer:1},
{q:'What is a rudiment in drumming?',options:['A basic pattern','A guitar chord','A vocal warm-up','A dance move'],answer:0},
{q:'What does ghost note mean?',options:['A loud hit','A soft grace note','A missed beat','A cymbal crash'],answer:1}
],
'Piano':[
{q:'How many keys does a standard piano have?',options:['61','76','88','108'],answer:2},
{q:'What does C Major scale start on?',options:['C','D','E','G'],answer:0}
],
'Guitar':[
{q:'How many strings does a standard guitar have?',options:['4','5','6','7'],answer:2},
{q:'What is a capo used for?',options:['Changing pitch','Muting strings','Amplifying','Tuning'],answer:0}
],
'Bass':[
{q:'How many strings on a standard bass?',options:['3','4','5','6'],answer:1},
{q:'What does a bass player lock with?',options:['Singer','Guitarist','Drummer','Piano'],answer:2}
],
'Vocals':[
{q:'What is the diaphragm used for?',options:['Breath support','Singing higher','Harmony','Rhythm'],answer:0},
{q:'What is vibrato?',options:['Fast volume change','Pitch oscillation','Breath control','High note'],answer:1}
],
'Saxophone':[
{q:'What is a reed used for?',options:['Producing sound','Cleaning','Tuning','Protection'],answer:0}
],
'Theory':[
{q:'How many notes in a major scale?',options:['5','6','7','8'],answer:2}
]
};

const icons={'Drum':'fa-drum','Piano':'fa-keyboard','Guitar':'fa-guitar','Bass':'fa-guitar','Vocals':'fa-microphone','Saxophone':'fa-saxophone','Theory':'fa-book-open'};

let lessons=[];
let currentCategory=null;
let currentLessonIdx=0;
let categoryLessons=[];

async function loadLessons(){
try {
const data=await API.get('/api/lessons');
lessons=data.lessons;
renderCategories();
if(currentCategory)showCategory(currentCategory);
updateProgress();
} catch(e){document.querySelector('.page-header p').textContent='Please log in to access lessons'}
}

function renderCategories(){
const cats=[...new Set(lessons.map(l=>l.category))];
const bar=document.getElementById('categoryBar');
bar.innerHTML=cats.map(c=>{
const count=lessons.filter(l=>l.category===c).length;
return `<div class="cat-pill ${c===currentCategory?'active':''}" onclick="showCategory('${c}')"><i class="fa-solid ${icons[c]||'fa-music'}"></i>${c}<span class="count">${count}</span></div>`;
}).join('');
}

function showCategory(cat){
currentCategory=cat;
document.getElementById('playerSection').classList.remove('show');
document.getElementById('lessonGrid').style.display='grid';
document.getElementById('progressText').textContent=cat+' lessons';
renderCategories();
categoryLessons=lessons.filter(l=>l.category===cat);
const grid=document.getElementById('lessonGrid');
grid.innerHTML=categoryLessons.map((l,i)=>{
const globalIdx=lessons.indexOf(l);
return `<div class="lesson-card" onclick="openLesson(${globalIdx})">
<div class="thumb"><img src="https://img.youtube.com/vi/${l.video_url}/mqdefault.jpg" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"><div class="play-overlay"><i class="fa-solid fa-play-circle"></i></div></div>
<div class="info">
<span class="cat-tag">${l.category}</span>
<h3>${l.title}</h3>
<p>${l.description}</p>
${l.completed?'<span class="done-badge"><i class="fa-solid fa-check-circle"></i> Completed</span>':''}
</div>
</div>`;
}).join('');
}

function openLesson(idx){
currentLessonIdx=idx;
const l=lessons[idx];
document.getElementById('lessonGrid').style.display='none';
document.getElementById('playerSection').classList.add('show');
document.getElementById('progressText').textContent='Now Playing: '+l.category;
document.getElementById('videoFrame').src='';
document.getElementById('videoFrame').style.display='none';
document.getElementById('ytThumb').style.display='flex';
document.getElementById('ytThumbImg').src='https://img.youtube.com/vi/'+l.video_url+'/mqdefault.jpg';
document.getElementById('ytThumb').onclick=function(){
document.getElementById('ytThumb').style.display='none';
document.getElementById('videoFrame').style.display='block';
document.getElementById('videoFrame').src='https://www.youtube.com/embed/'+l.video_url+'?autoplay=1&rel=0&mute=1';
};
document.getElementById('ytLinkBtn').href='https://www.youtube.com/watch?v='+l.video_url;
document.getElementById('lessonTitle').textContent=l.title;
document.getElementById('lessonDesc').textContent=l.description;
renderQuiz(idx);
updateProgress();
const badge=document.getElementById('completionBadge');
badge.innerHTML=l.completed?'<span class="complete-badge" style="display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:20px;background:rgba(66,183,42,0.15);color:#42b72a;font-weight:600;font-size:14px"><i class="fa-solid fa-check-circle"></i> Completed</span>':'';
}

function closePlayer(){
document.getElementById('playerSection').classList.remove('show');
document.getElementById('lessonGrid').style.display='grid';
document.getElementById('progressText').textContent=currentCategory+' lessons';
document.getElementById('videoFrame').src='';
document.getElementById('videoFrame').style.display='none';
document.getElementById('ytThumb').style.display='flex';
document.getElementById('ytThumbImg').src='';
}

function renderQuiz(idx){
const l=lessons[idx];
const catQuiz=quizData[l.category]||[];
if(!catQuiz.length){document.getElementById('quizArea').innerHTML='';return}
const qIdx=categoryLessons.indexOf(l);
const q=catQuiz[qIdx>=catQuiz.length?catQuiz.length-1:qIdx];
if(!q){document.getElementById('quizArea').innerHTML='';return}
const area=document.getElementById('quizArea');
area.innerHTML=`
<div class="quiz-card">
<h3><i class="fa-solid fa-circle-question"></i> Quick Quiz</h3>
<div class="quiz-q">
<div class="q-title">${q.q}</div>
${q.options.map((o,i)=>`
<label class="quiz-opt"><input type="radio" name="q" value="${i}" ${l.completed?'disabled':''}><span>${o}</span></label>
`).join('')}
</div>
${l.completed?'<div class="quiz-result pass" style="display:block">Correct! You passed this quiz.</div>':''}
<button class="submit-quiz" onclick="checkQuiz(${idx})" ${l.completed?'style="display:none"':''}>Submit Answer</button>
</div>`;
}

async function checkQuiz(idx){
const sel=document.querySelector('input[name="q"]:checked');
if(!sel)return alert('Please select an answer');
const ans=parseInt(sel.value);
const l=lessons[idx];
const catQuiz=quizData[l.category]||[];
const qIdx=categoryLessons.indexOf(l);
const q=catQuiz[qIdx>=catQuiz.length?catQuiz.length-1:qIdx];
if(!q)return;
const correct=ans===q.answer;
try {
await API.post('/api/lessons/'+lessons[idx].id+'/complete',{passed:correct});
loadLessons();
} catch(e){alert(e.message)}
}

function changeLesson(dir){
const next=currentLessonIdx+dir;
if(next<0||next>=lessons.length)return;
openLesson(next);
}

function updateProgress(){
const done=lessons.filter(l=>l.completed).length;
const pct=lessons.length?Math.round((done/lessons.length)*100):0;
document.getElementById('overallProgress').style.width=pct+'%';
document.getElementById('progressPct').textContent=pct+'%';
}

loadLessons();
</script>
</body>
</html>
