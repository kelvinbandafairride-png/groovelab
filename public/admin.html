<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1877f2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Admin Dashboard - Groove Lab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="/js/api.js"></script>
<script src="/js/notifications.js"></script>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--bg:#f0f2f5;--card:#fff;--text:#111;--text2:#555;--border:#ddd;--primary:#1877f2}
body{background:var(--bg);color:var(--text)}
body.dark{--bg:#0d1117;--card:#161b22;--text:#e6edf3;--text2:#8b949e;--border:#30363d;--primary:#58a6ff}
.navbar{width:100%;height:75px;background:rgba(255,255,255,0.88);backdrop-filter:blur(18px);position:fixed;top:0;display:flex;align-items:center;justify-content:space-between;padding:0 25px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
body.dark .navbar{background:rgba(22,27,34,0.92)}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo i{font-size:34px;color:var(--primary)}
.logo h1{color:var(--primary);font-size:32px}
.nav-icons{display:flex;align-items:center;gap:12px}
.icon-box{width:45px;height:45px;background:var(--card);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;border:none;color:var(--text);font-size:18px;text-decoration:none}
.icon-box:hover{background:var(--primary);color:#fff}
.theme-btn{width:45px;height:45px;border-radius:50%;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;color:var(--text);transition:0.3s}
.theme-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.badge-admin{background:#e74c3c;color:#fff;font-size:11px;padding:2px 10px;border-radius:10px;margin-left:8px}
.container{max-width:1200px;margin:0 auto;padding:100px 20px 30px}
.page-header{margin-bottom:25px}
.page-header h2{font-size:28px}
.page-header h2 i{color:var(--primary);margin-right:10px}
.page-header p{color:var(--text2);margin-top:5px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:30px}
.stat-card{background:var(--card);border-radius:20px;padding:22px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.stat-card .stat-icon{width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;color:#fff}
.stat-card .stat-num{font-size:28px;font-weight:700}
.stat-card .stat-label{color:var(--text2);font-size:14px;margin-top:3px}
.bg-blue{background:var(--primary)}.bg-green{background:#42b72a}.bg-orange{background:#e67e22}.bg-red{background:#e74c3c}.bg-purple{background:#9b59b6}
.admin-grid{display:grid;grid-template-columns:2fr 1fr;gap:25px}
.table-card{background:var(--card);border-radius:24px;padding:25px;box-shadow:0 5px 15px rgba(0,0,0,0.05);margin-bottom:20px}
.table-card h3{margin-bottom:18px;font-size:20px}
.table-card h3 i{color:var(--primary);margin-right:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 8px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
th{color:var(--text2);font-weight:600;font-size:13px;text-transform:uppercase}
td img{width:32px;height:32px;border-radius:50%;object-fit:cover;margin-right:8px;vertical-align:middle}
.status{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.status.active{background:rgba(66,183,42,0.15);color:#42b72a}
.status.banned{background:rgba(231,76,60,0.15);color:#e74c3c}
.action-btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:0.3s;margin-right:4px}
.action-btn.ban{background:rgba(231,76,60,0.1);color:#e74c3c}
.action-btn.ban:hover{background:#e74c3c;color:#fff}
.action-btn.warn{background:rgba(230,126,34,0.1);color:#e67e22}
.action-btn.warn:hover{background:#e67e22;color:#fff}
.action-btn.delete{background:rgba(231,76,60,0.15);color:#e74c3c}
.action-btn.delete:hover{background:#e74c3c;color:#fff}
.action-btn.edit{background:rgba(24,119,242,0.1);color:var(--primary)}
.action-btn.edit:hover{background:var(--primary);color:#fff}
.action-btn.add{background:#42b72a;color:#fff}
.action-btn.add:hover{background:#36a020}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:2000}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:24px;padding:30px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-content h3{font-size:22px;margin-bottom:20px}
.modal-content h3 i{color:var(--primary);margin-right:10px}
.modal-content input,.modal-content textarea,.modal-content select{width:100%;padding:12px 16px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:12px;transition:0.3s}
.modal-content input:focus,.modal-content textarea:focus,.modal-content select:focus{border-color:var(--primary)}
.modal-content textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions button{flex:1;padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:0.3s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-secondary{background:var(--bg);color:var(--text)}
.btn-secondary:hover{opacity:0.8}
@media(max-width:600px){
.navbar{padding:0 10px;height:62px}
.logo h1{display:none}
.nav-icons{gap:4px}
.icon-box{width:36px;height:36px;border-radius:8px;font-size:14px}
.theme-btn{width:36px;height:36px;font-size:14px;border-radius:8px;border-width:1px}
}
@media(max-width:768px){.admin-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<nav class="navbar">
<a href="index.html" class="logo"><i class="fa-solid fa-music"></i><h1>Groove Lab</h1></a>
<div class="nav-icons">
<a href="mainmenu.html" class="icon-box"><i class="fa-solid fa-house"></i></a>
<a href="bpm.html" class="icon-box"><i class="fa-solid fa-gauge-high"></i></a>
<a href="loops.html" class="icon-box"><i class="fa-solid fa-drum"></i></a>
<a href="community.html" class="icon-box"><i class="fa-solid fa-comments"></i></a>
<a href="upload.html" class="icon-box"><i class="fa-solid fa-upload"></i></a>
<a href="about.html" class="icon-box"><i class="fa-solid fa-circle-info"></i></a>
<button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
</div>
</nav>

<div class="container">
<div class="page-header">
<h2><i class="fa-solid fa-shield-halved"></i> Admin Dashboard <span class="badge-admin">Admin</span></h2>
<p id="adminInfo">Loading admin data...</p>
</div>
<div class="stats-grid" id="statsGrid"></div>

<div class="table-card">
<h3><i class="fa-solid fa-users"></i> User Management</h3>
<table><thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody id="userTable"></tbody></table>
</div>

<div class="table-card">
<h3><i class="fa-solid fa-graduation-cap"></i> Lessons Management <button class="action-btn add" onclick="showLessonModal()" style="float:right"><i class="fa-solid fa-plus"></i> Add Lesson</button></h3>
<table><thead><tr><th>Title</th><th>Category</th><th>Order</th><th>Actions</th></tr></thead><tbody id="lessonTable"></tbody></table>
</div>

<div class="table-card">
<h3><i class="fa-solid fa-trophy"></i> User Progress & Achievements</h3>
<table><thead><tr><th>User</th><th>Email</th><th>Completed Lessons</th><th>Achievements</th><th>Joined</th></tr></thead><tbody id="progressTable"></tbody></table>
</div>

<div class="table-card">
<h3><i class="fa-solid fa-chart-line"></i> Platform Activity</h3>
<div id="activitySection"></div>
</div>
</div>

<!-- Lesson Modal -->
<div class="modal" id="lessonModal">
<div class="modal-content">
<h3><i class="fa-solid fa-book"></i> <span id="lessonModalTitle">Add Lesson</span></h3>
<input type="hidden" id="lessonId">
<input type="text" id="lessonTitle" placeholder="Lesson Title">
<textarea id="lessonDesc" placeholder="Description"></textarea>
<input type="text" id="lessonCategory" placeholder="Category (e.g. Drum, Guitar, Piano)">
<input type="text" id="lessonVideo" placeholder="YouTube Video ID (e.g. 2SUwOgmvzK4)">
<input type="number" id="lessonOrder" placeholder="Order Index (0, 1, 2...)">
<div class="modal-actions">
<button class="btn-secondary" onclick="closeLessonModal()">Cancel</button>
<button class="btn-primary" onclick="saveLesson()">Save Lesson</button>
</div>
</div>
</div>

<script>
function toggleTheme(){
document.body.classList.toggle('dark');
const i=document.querySelector('.theme-btn i');
i.className=document.body.classList.contains('dark')?'fa-solid fa-sun':'fa-solid fa-moon';
localStorage.setItem('grooveTheme',document.body.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('grooveTheme')==='dark'){document.body.classList.add('dark');document.querySelector('.theme-btn i').className='fa-solid fa-sun'}

async function loadAdmin(){
try {
const user=await API.getMe();
if(!user||user.role!=='admin'){document.getElementById('adminInfo').textContent='Admin access only. Redirecting...';setTimeout(()=>window.location='login.html',2000);return}
document.getElementById('adminInfo').textContent='Welcome, '+user.first_name+'. Manage the platform below.';

const stats=await API.get('/api/admin/stats');
document.getElementById('statsGrid').innerHTML=`
<div class="stat-card"><div class="stat-icon bg-blue"><i class="fa-solid fa-users"></i></div><div class="stat-num">${stats.users}</div><div class="stat-label">Total Users</div></div>
<div class="stat-card"><div class="stat-icon bg-green"><i class="fa-solid fa-book"></i></div><div class="stat-num">${stats.lessons}</div><div class="stat-label">Total Lessons</div></div>
<div class="stat-card"><div class="stat-icon bg-orange"><i class="fa-solid fa-music"></i></div><div class="stat-num">${stats.uploads}</div><div class="stat-label">Beats Uploaded</div></div>
<div class="stat-card"><div class="stat-icon bg-red"><i class="fa-solid fa-flag"></i></div><div class="stat-num">${stats.reports}</div><div class="stat-label">Banned Users</div></div>
<div class="stat-card"><div class="stat-icon bg-purple"><i class="fa-solid fa-comment"></i></div><div class="stat-num">${stats.posts}</div><div class="stat-label">Forum Posts</div></div>
<div class="stat-card"><div class="stat-icon bg-blue"><i class="fa-solid fa-user-plus"></i></div><div class="stat-num">${stats.todayUsers}</div><div class="stat-label">New Today</div></div>`;

// Users
const usersData=await API.get('/api/admin/users');
document.getElementById('userTable').innerHTML=usersData.users.map(u=>`
<tr>
<td><img src="${u.avatar}"> ${u.first_name} ${u.surname}</td>
<td style="font-size:13px;color:var(--text2)">${u.email}</td>
<td>${u.role}</td>
<td><span class="status ${u.banned?'banned':'active'}">${u.banned?'Banned':'Active'}</span></td>
<td>
<button class="action-btn warn" onclick="warnUser(${u.id})" title="Send Warning"><i class="fa-solid fa-bell"></i></button>
<button class="action-btn ban" onclick="banUser(${u.id})">${u.banned?'<i class="fa-solid fa-check"></i> Unban':'<i class="fa-solid fa-ban"></i> Ban'}</button>
<button class="action-btn delete" onclick="deleteUser(${u.id})" title="Delete User"><i class="fa-solid fa-trash"></i></button>
</td>
</tr>`).join('');

// Lessons
loadLessons();

// Progress
loadProgress();

// Activity
document.getElementById('activitySection').innerHTML=`
<div style="margin-bottom:12px"><p style="display:flex;justify-content:space-between;font-size:14px"><span>Total Users</span><span>${stats.users}</span></p><div style="height:8px;background:var(--bg);border-radius:20px;overflow:hidden;margin-top:5px"><div style="height:100%;width:${Math.min(100,stats.users/10)}%;background:var(--primary);border-radius:20px"></div></div></div>
<div style="margin-bottom:12px"><p style="display:flex;justify-content:space-between;font-size:14px"><span>Total Uploads</span><span>${stats.uploads}</span></p><div style="height:8px;background:var(--bg);border-radius:20px;overflow:hidden;margin-top:5px"><div style="height:100%;width:${Math.min(100,stats.uploads/5)}%;background:#42b72a;border-radius:20px"></div></div></div>
<div><p style="display:flex;justify-content:space-between;font-size:14px"><span>Forum Posts</span><span>${stats.posts}</span></p><div style="height:8px;background:var(--bg);border-radius:20px;overflow:hidden;margin-top:5px"><div style="height:100%;width:${Math.min(100,stats.posts/2)}%;background:#e67e22;border-radius:20px"></div></div></div>`;
} catch(e){document.getElementById('adminInfo').textContent='Error loading admin data. Make sure you are logged in as admin.';console.error(e)}
}

// ========== LESSONS MANAGEMENT ==========
async function loadLessons(){
try {
const data=await API.get('/api/admin/lessons');
document.getElementById('lessonTable').innerHTML=data.lessons.map(l=>`
<tr>
<td>${l.title}</td>
<td><span class="status active">${l.category}</span></td>
<td>${l.order_index}</td>
<td>
<button class="action-btn edit" onclick="editLesson(${l.id})"><i class="fa-solid fa-pen"></i> Edit</button>
<button class="action-btn delete" onclick="deleteLesson(${l.id})"><i class="fa-solid fa-trash"></i> Delete</button>
</td>
</tr>`).join('');
} catch(e){console.error(e)}
}

function showLessonModal(data){
document.getElementById('lessonModal').classList.add('show');
if(data){
document.getElementById('lessonModalTitle').textContent='Edit Lesson';
document.getElementById('lessonId').value=data.id;
document.getElementById('lessonTitle').value=data.title;
document.getElementById('lessonDesc').value=data.description;
document.getElementById('lessonCategory').value=data.category;
document.getElementById('lessonVideo').value=data.video_url;
document.getElementById('lessonOrder').value=data.order_index;
} else {
document.getElementById('lessonModalTitle').textContent='Add Lesson';
document.getElementById('lessonId').value='';
document.getElementById('lessonTitle').value='';
document.getElementById('lessonDesc').value='';
document.getElementById('lessonCategory').value='';
document.getElementById('lessonVideo').value='';
document.getElementById('lessonOrder').value='0';
}
}

function closeLessonModal(){
document.getElementById('lessonModal').classList.remove('show');
}

async function saveLesson(){
const id=document.getElementById('lessonId').value;
const title=document.getElementById('lessonTitle').value.trim();
const description=document.getElementById('lessonDesc').value.trim();
const category=document.getElementById('lessonCategory').value.trim();
const video_url=document.getElementById('lessonVideo').value.trim();
const order_index=parseInt(document.getElementById('lessonOrder').value)||0;
if(!title||!description||!category||!video_url){alert('All fields required');return}
try {
if(id){
await API.put('/api/admin/lessons/'+id,{title,description,category,video_url,order_index});
} else {
await API.post('/api/admin/lessons',{title,description,category,video_url,order_index});
}
closeLessonModal();
loadLessons();
loadProgress();
} catch(e){alert(e.message)}
}

async function editLesson(id){
try {
const data=await API.get('/api/admin/lessons');
const lesson=data.lessons.find(l=>l.id==id);
if(lesson) showLessonModal(lesson);
} catch(e){alert(e.message)}
}

async function deleteLesson(id){
if(!confirm('Delete this lesson? This will also remove all progress for this lesson.')) return;
try {
await API.del('/api/admin/lessons/'+id);
loadLessons();
loadProgress();
} catch(e){alert(e.message)}
}

// ========== USER PROGRESS ==========
async function loadProgress(){
try {
const data=await API.get('/api/admin/progress');
const tbody=document.getElementById('progressTable');
tbody.innerHTML=data.users.map(u=>{
const prog=data.progressByUser[u.id];
const ach=data.achievementsByUser[u.id];
const completed=prog?prog.completed:0;
const badges=ach?ach.map(a=>'<span class="status active" style="margin:2px;display:inline-block">'+a.badge_name+'</span>').join(''):'<span style="color:var(--text2)">None</span>';
return `<tr>
<td><img src="${u.avatar}"> ${u.first_name} ${u.surname}</td>
<td style="font-size:13px;color:var(--text2)">${u.email}</td>
<td>${completed} / ${data.lessonsCount||'?'}</td>
<td>${badges}</td>
<td style="font-size:13px;color:var(--text2)">${new Date(u.joined_at).toLocaleDateString()}</td>
</tr>`;
}).join('');
// Show total lessons count
const lessonsData=await API.get('/api/admin/lessons');
const rows=document.querySelectorAll('#progressTable tr');
// Store lessons count for display
data.lessonsCount=lessonsData.lessons.length;
// Re-render with count
tbody.innerHTML=data.users.map(u=>{
const prog=data.progressByUser[u.id];
const ach=data.achievementsByUser[u.id];
const completed=prog?prog.completed:0;
const badges=ach?ach.map(a=>'<span class="status active" style="margin:2px;display:inline-block">'+a.badge_name+'</span>').join(''):'<span style="color:var(--text2)">None</span>';
return `<tr>
<td><img src="${u.avatar}"> ${u.first_name} ${u.surname}</td>
<td style="font-size:13px;color:var(--text2)">${u.email}</td>
<td>${completed} / ${lessonsData.lessons.length}</td>
<td>${badges}</td>
<td style="font-size:13px;color:var(--text2)">${new Date(u.joined_at).toLocaleDateString()}</td>
</tr>`;
}).join('');
} catch(e){console.error(e)}
}

// ========== USER ACTIONS ==========
async function banUser(id){
try {
await API.post('/api/admin/users/'+id+'/ban',{});
loadAdmin();
} catch(e){alert(e.message)}
}

async function warnUser(id){
try {
await API.post('/api/admin/users/'+id+'/warn',{});
alert('Warning sent to user');
} catch(e){alert(e.message)}
}

async function deleteUser(id){
if(!confirm('Permanently delete this user and all their data? This cannot be undone.')) return;
try {
await API.del('/api/admin/users/'+id);
loadAdmin();
} catch(e){alert(e.message)}
}

// Close modal on backdrop click
document.getElementById('lessonModal').addEventListener('click',function(e){
if(e.target===this) closeLessonModal();
});

loadAdmin();
</script>
</body>
</html>
